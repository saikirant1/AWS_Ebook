<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact Submissions – EpicReads Admin</title>

  <!-- Reuse project styles -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link href="css/bootstrap.min.css" rel="stylesheet" />
  <link href="css/bootstrap-icons.css" rel="stylesheet" />
  <link href="css/templatemo-ebook-landing.css" rel="stylesheet" />

  <style>
    body {
      background: #0d0d0d;
      color: #f0f0f0;
      font-family: 'Unbounded', system-ui, Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    .admin-header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 24px 32px;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .admin-header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin: 0;
      color: #fff;
    }

    .admin-header a {
      color: #a78bfa;
      text-decoration: none;
      font-size: 0.85rem;
      margin-left: auto;
    }

    .admin-header a:hover { text-decoration: underline; }

    .admin-body {
      padding: 32px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .badge-count {
      background: #a78bfa22;
      border: 1px solid #a78bfa55;
      color: #a78bfa;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .btn-load {
      background: #a78bfa;
      color: #0d0d0d;
      border: none;
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      display: none;
      transition: background 0.2s;
    }

    .btn-load:hover { background: #c4b5fd; }
    .btn-load:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-refresh {
      background: transparent;
      color: #a78bfa;
      border: 1px solid #a78bfa55;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-refresh:hover {
      background: #a78bfa22;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 10px;
      border: 1px solid #2a2a4a;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 900px;
    }

    thead tr {
      background: #1a1a2e;
    }

    th {
      padding: 14px 16px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #a78bfa;
      border-bottom: 1px solid #2a2a4a;
      white-space: nowrap;
    }

    td {
      padding: 12px 16px;
      font-size: 0.85rem;
      border-bottom: 1px solid #1e1e3a;
      vertical-align: top;
      color: #d1d5db;
    }

    tbody tr:last-child td { border-bottom: none; }

    tbody tr:hover { background: #1a1a2e88; }

    .td-time {
      white-space: nowrap;
      color: #9ca3af;
      font-size: 0.78rem;
    }

    .td-id {
      font-family: monospace;
      font-size: 0.72rem;
      color: #6b7280;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .td-message {
      max-width: 280px;
      word-break: break-word;
    }

    .td-email a {
      color: #a78bfa;
      text-decoration: none;
    }

    .td-email a:hover { text-decoration: underline; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
    }

    .empty-state i {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 12px;
      color: #374151;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #a78bfa44;
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-banner {
      background: #7f1d1d33;
      border: 1px solid #ef444455;
      color: #fca5a5;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 0.85rem;
      display: none;
    }
  </style>
</head>

<body>

  <!-- Header -->
  <div class="admin-header">
    <i class="bi-envelope-check" style="font-size:1.5rem; color:#a78bfa;"></i>
    <h1>Contact Submissions</h1>
    <a href="index.html"><i class="bi-arrow-left me-1"></i>Back to site</a>
  </div>

  <!-- Main content -->
  <div class="admin-body">

    <div id="errorBanner" class="error-banner"></div>

    <div class="controls">
      <span id="count" class="badge-count">Loading…</span>
      <button class="btn-refresh" id="btnRefresh" onclick="refresh()">
        <i class="bi-arrow-clockwise me-1"></i>Refresh
      </button>
      <button class="btn-load" id="loadMore">
        Load more
      </button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th><i class="bi-clock me-1"></i>Time</th>
            <th><i class="bi-person me-1"></i>Name</th>
            <th><i class="bi-envelope me-1"></i>Email</th>
            <th><i class="bi-telephone me-1"></i>Phone</th>
            <th><i class="bi-chat-left-text me-1"></i>Message</th>
            <th><i class="bi-hash me-1"></i>ID</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr>
            <td colspan="6" class="empty-state">
              <span class="spinner"></span> Loading submissions…
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

  <script>
    // ─── CONFIG ──────────────────────────────────────────────────────────────
    // Replace with your actual GET API endpoint after creating it in API Gateway
    const API = "https://ib5mu40ryb.execute-api.us-east-1.amazonaws.com/dev/epicreads_resource";
    // ─────────────────────────────────────────────────────────────────────────

    let lastKey = null;
    let total   = 0;

    // Format ISO timestamp to readable local time
    function formatTime(iso) {
      if (!iso) return "—";
      try {
        return new Date(iso).toLocaleString(undefined, {
          year: "numeric", month: "short", day: "numeric",
          hour: "2-digit", minute: "2-digit"
        });
      } catch { return iso; }
    }

    // Escape HTML to prevent XSS
    function esc(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function showError(msg) {
      const el = document.getElementById("errorBanner");
      el.textContent = "⚠️ " + msg;
      el.style.display = "block";
    }

    function hideError() {
      document.getElementById("errorBanner").style.display = "none";
    }

    function addRow(item) {
      const tbody = document.getElementById("rows");

      // Remove empty/loading state row on first real row
      const placeholder = tbody.querySelector(".empty-state");
      if (placeholder) placeholder.closest("tr").remove();

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="td-time">${esc(formatTime(item.createdAt))}</td>
        <td>${esc(item.name)}</td>
        <td class="td-email"><a href="mailto:${esc(item.email)}">${esc(item.email)}</a></td>
        <td>${esc(item.phone)}</td>
        <td class="td-message">${esc(item.message)}</td>
        <td class="td-id" title="${esc(item.id)}">${esc(item.id)}</td>
      `;
      tbody.appendChild(tr);
    }

    function showEmptyState() {
      const tbody = document.getElementById("rows");
      tbody.innerHTML = `
        <tr>
          <td colspan="6" class="empty-state">
            <i class="bi-inbox"></i>
            No submissions yet
          </td>
        </tr>`;
    }

    async function fetchPage() {
      hideError();
      const btn = document.getElementById("loadMore");
      btn.disabled = true;
      btn.innerHTML = `<span class="spinner"></span> Loading…`;

      try {
        const url = new URL(API);
        url.searchParams.set("limit", "25");
        if (lastKey) url.searchParams.set("lastKey", lastKey);

        const res  = await fetch(url.toString(), {
          headers: { "Accept": "application/json" },
          cache: "no-store"
        });

        if (!res.ok) {
          const text = await res.text();
          throw new Error(`HTTP ${res.status} – ${text || "No body"}`);
        }

        const data = await res.json();

        if (!Array.isArray(data.items)) {
          throw new Error("Unexpected response format from API");
        }

        if (data.items.length === 0 && total === 0) {
          showEmptyState();
        } else {
          data.items.forEach(addRow);
        }

        total += data.items.length;
        document.getElementById("count").textContent =
          `${total} submission${total !== 1 ? "s" : ""} loaded`;

        lastKey = data.lastKey || null;
        btn.style.display  = lastKey ? "inline-block" : "none";
        btn.disabled       = false;
        btn.innerHTML      = "Load more";

      } catch (err) {
        console.error("Fetch error:", err);
        showError(err.message);
        document.getElementById("count").textContent = "Error loading data";
        btn.style.display = "none";

        // Show empty state if nothing loaded yet
        if (total === 0) showEmptyState();
      }
    }

    function refresh() {
      // Reset state and reload from scratch
      lastKey = null;
      total   = 0;
      document.getElementById("rows").innerHTML = `
        <tr>
          <td colspan="6" class="empty-state">
            <span class="spinner"></span> Loading submissions…
          </td>
        </tr>`;
      document.getElementById("count").textContent = "Loading…";
      document.getElementById("loadMore").style.display = "none";
      fetchPage();
    }

    document.getElementById("loadMore").addEventListener("click", fetchPage);

    // Initial load
    fetchPage();
  </script>

</body>
</html>
